version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: edu_postgres
    restart: always
    environment:
      POSTGRES_DB: edu_monitoring
      POSTGRES_USER: edu_user
      POSTGRES_PASSWORD: strongpassword
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./edu_monitoring_schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./edu_field_registry.sql:/docker-entrypoint-initdb.d/2_registry.sql
    ports:
      - "5432:5432"

  api:
    image: python:3.12-slim
    container_name: edu_api
    depends_on:
      - postgres
    working_dir: /app
    volumes:
      - ./api.py:/app/api.py
    command: >
      sh -c "pip install fastapi uvicorn sqlalchemy asyncpg python-dotenv pydantic &&
             uvicorn api:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://edu_user:strongpassword@postgres:5432/edu_monitoring
    ports:
      - "8000:8000"

volumes:
  pg_data:
