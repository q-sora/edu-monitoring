
# ─────────────────────────────────────────────────────────────────────────────
#  EDU Monitoring — Full local / on-premise stack (100% self-hosted)
#
#  Quick start:
#    cp .env.example .env  &&  nano .env           # fill in secrets
#    docker compose up -d postgres redis           # start dependencies
#    docker compose run --rm api alembic upgrade head
#    docker compose run --rm api python -m scripts.seed_data
#    docker compose run --rm api python -m scripts.create_superadmin
#    docker compose up -d                          # start API + workers
#
#  API:        http://localhost:8000/api/docs  (DEBUG=true only)
#  Superset:   http://localhost:8088  (--profile visualization)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 (primary) ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: edu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       edu_monitoring
      POSTGRES_USER:     edu_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Bootstrap schema on first start
      - ./edu_monitoring_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./edu_field_registry.sql:/docker-entrypoint-initdb.d/02_registry.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-edu_db}"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── PostgreSQL read replica (optional, enabled with --profile replica) ────
  postgres_replica:
    image: postgres:16-alpine
    container_name: edu_postgres_replica
    restart: unless-stopped
    environment:
      POSTGRES_DB:       edu_monitoring
      POSTGRES_USER:     edu_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata_replica:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    profiles: ["replica"]

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: edu_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: edu_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://edu_user:${DB_PASSWORD:-changeme}@postgres:5432/edu_monitoring
      DATABASE_REPLICA_URL: ""
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/2
      # Local JWT configuration (no external provider)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}
      # Bootstrap (for seed script)
      BOOTSTRAP_SUPERADMIN_EMAIL: ${BOOTSTRAP_SUPERADMIN_EMAIL:-}
      BOOTSTRAP_SUPERADMIN_PASSWORD: ${BOOTSTRAP_SUPERADMIN_PASSWORD:-}
      # External APIs (optional)
      NOBD_API_KEY: ${NOBD_API_KEY:-}
      EPVO_API_KEY: ${EPVO_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --log-level info
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Celery worker ──────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: edu_celery_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://edu_user:${DB_PASSWORD:-changeme}@postgres:5432/edu_monitoring
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/2
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      NOBD_API_KEY: ${NOBD_API_KEY:-}
      EPVO_API_KEY: ${EPVO_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --concurrency=4

  # ── Celery beat (scheduler) ────────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: edu_celery_beat
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/2
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      - redis
    command: celery -A app.workers.celery_app beat --loglevel=info

  # ── React frontend (built with Vite, served by nginx) ─────────────────────
  frontend:
    build:
      context: ../edu-portal/edu_frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: edu_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    profiles: ["frontend"]

  # ── Flower (Celery monitoring) ─────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: edu_flower
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
      FLOWER_BASIC_AUTH: ${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}
    depends_on:
      - redis
    ports:
      - "5555:5555"
    profiles: ["monitoring"]

  # ── Apache Superset (BI / dashboards) ─────────────────────────────────────
  superset:
    image: apache/superset:4.0.0
    container_name: edu_superset
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-supersecretkey32chars}
      SUPERSET_CONFIG_PATH: /app/superset_config_override.py
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8088:8088"
    volumes:
      - supersetdata:/app/superset_home
      - ./superset_config_override.py:/app/superset_config_override.py:ro
    profiles: ["visualization"]

volumes:
  pgdata:
  pgdata_replica:
  redisdata:
  supersetdata:
