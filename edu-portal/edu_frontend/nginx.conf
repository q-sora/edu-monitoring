map $request_uri $superset_frame_opts {
    default "SAMEORIGIN";
    ~^/(embedded|static|superset|api/v1/chart|api/v1/dashboard|api/v1/security|tabstateview|savedstatusview) "";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip for JS/CSS/JSON
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;

    # ── Superset proxy helper ──────────────────────────────────────────────
    # Common proxy settings used by all Superset location blocks
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;

    # /bi/ — entry path used by the embedded SDK (supersetDomain = origin+"/bi")
    location /bi/ {
        proxy_pass http://edu_superset:8088/;
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # Superset static assets — referenced with absolute paths in Superset HTML
    location /static/ {
        proxy_pass http://edu_superset:8088/static/;
        proxy_hide_header X-Frame-Options;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Superset embedded dashboard handler (SDK iframe src = /bi/embedded/{uuid})
    # Already covered by /bi/, but add explicit route for safety
    location /embedded/ {
        proxy_pass http://edu_superset:8088/embedded/;
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # Superset views (welcome page, legacy dashboard routes, etc.)
    location /superset/ {
        proxy_pass http://edu_superset:8088/superset/;
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # Superset REST API — chart/dashboard data fetched by the embedded SPA
    # (our edu_api is on port 8000 directly, no conflict here)
    location /api/v1/chart/ {
        proxy_pass http://edu_superset:8088/api/v1/chart/;
        proxy_hide_header X-Frame-Options;
    }
    location /api/v1/dashboard/ {
        proxy_pass http://edu_superset:8088/api/v1/dashboard/;
        proxy_hide_header X-Frame-Options;
    }
    location /api/v1/security/ {
        proxy_pass http://edu_superset:8088/api/v1/security/;
        proxy_hide_header X-Frame-Options;
    }
    location /api/v1/query/ {
        proxy_pass http://edu_superset:8088/api/v1/query/;
        proxy_hide_header X-Frame-Options;
    }
    location /api/v1/sqllab/ {
        proxy_pass http://edu_superset:8088/api/v1/sqllab/;
        proxy_hide_header X-Frame-Options;
    }
    location /tabstateview/ {
        proxy_pass http://edu_superset:8088/tabstateview/;
        proxy_hide_header X-Frame-Options;
    }

    # Superset API catch-all — embedded.js calls /api/v1/me/roles/ and other
    # paths relative to the iframe origin; any /api/v1/ not matched above goes here.
    location /api/v1/ {
        proxy_pass http://edu_superset:8088/api/v1/;
        proxy_hide_header X-Frame-Options;
    }

    # ── React SPA (Vite) ───────────────────────────────────────────────────
    # Cache static assets aggressively (Vite adds content hash to filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: all unmatched routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Security headers (applied to SPA routes; Superset locations override as needed)
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy "strict-origin"     always;
    add_header X-XSS-Protection "1; mode=block"    always;
    add_header X-Frame-Options "SAMEORIGIN"        always;
}
